backtraces-path = ".config/neovide/backtraces.log"
wsl = false
multigrid = true
vsync = true
maximized = true
srgb = true
idle = true
neovim-bin = "/usr/local/bin/nvim"
# TYPE "TRANSPARENT" | "FULL" | "BUTTONLESS" | "NONE"
frame = "buttonless"
title-hidden = true

tabs = true
macos-native-tabs = true              # macOS only
system-native-tabs = true
macos-pinned-hotkey = "cmd+ctrl+z"    # macOS only
macos-switcher-hotkey = "cmd+ctrl+n"  # macOS only, requires macos-native-tabs = true
macos-tab-prev-hotkey = "cmd+shift+[" # macOS only
macos-tab-next-hotkey = "cmd+shift+]" # macOS only

[box-drawing]
mode = "native" # "font-glyph" | "native" | "selected-native"

[box-drawing.sizes]
default = [1, 6]
12 = [1, 2]
15 = [1, 6]
18 = [3, 8]

[font]
size = 14
hinting = "full"
edging = "antialias"
underline_offset = 6.0

[[font.normal]]
family = "CaskaydiaCove Nerd Font"
style = "Regular"

[[font.italic]]
family = "CaskaydiaCove Nerd Font"
style = "Italic"

[[font.bold]]
family = "CaskaydiaCove Nerd Font"
style = "Bold"

[[font.bold_italic]]
family = "CaskaydiaCove Nerd Font"
style = "Bold Italic"

[font.features]
"CaskaydiaCove Nerd Font" = [
  "+ss01",
  "+ss02",
  "+ss03",
  "+ss19",
  "+ss20",
  "calt",
  "liga",
  # other might exist
]
